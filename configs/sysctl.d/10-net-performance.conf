##########################################################
# Network performance tuning
# Optimized for high-connection Linux servers
# (Blockchain validators, RPC nodes, reverse proxies)
##########################################################

##################################
# TCP Features
##################################

# Keep timestamps enabled for better RTT estimation and BBR
net.ipv4.tcp_timestamps = 1

# Enable Selective ACKs
net.ipv4.tcp_sack = 1

##################################
# Packet Queues
##################################

# Increase packet queue length
# 16384 is a good starting point for 1–10GbE systems.
net.core.netdev_max_backlog = 16384

##################################
# Socket Buffers
##################################

# Allow TCP autotuning to grow buffers up to 16MB
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Reasonable default socket buffers
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# Ancillary buffer limit
net.core.optmem_max = 65536

##################################
# TCP Autotuning
##################################

net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 131072 16777216

##################################
# TCP Window Scaling
##################################

net.ipv4.tcp_adv_win_scale = 1

##################################
# Listen Queues
##################################

# Allow more pending connections
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

##################################
# Ephemeral Ports
##################################

# Larger port range for many outbound connections
net.ipv4.ip_local_port_range = 10240 65535

##################################
# Connection Cleanup
##################################

# Reuse TIME_WAIT sockets when safe
net.ipv4.tcp_tw_reuse = 1

# Reduce FIN timeout
net.ipv4.tcp_fin_timeout = 15

##################################
# Congestion control algorithm
##################################
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
